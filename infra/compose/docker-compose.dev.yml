name: bellasos

# Local development overlay: exposes ports and starts Keycloak on :8080.
# Application services (api/worker/web) run on the host via `npm run dev:*`
# for fast hot-reload during development.

services:
  postgres:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  nats:
    ports:
      - '4222:4222'
      - '8222:8222'

  keycloak:
    ports:
      - '8080:8080'

  prometheus:
    ports:
      - '9090:9090'

  loki:
    ports:
      - '3100:3100'

  grafana:
    ports:
      - '3001:3000'
