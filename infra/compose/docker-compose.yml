name: bellasos

# Base stack: datastores, messaging, identity and observability.
# Overlaid by docker-compose.dev.yml (local dev) or docker-compose.prod.yml.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bellasos
      POSTGRES_PASSWORD: bellasos
      POSTGRES_DB: bellasos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bellasos']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ['-js', '-sd', '/data']
    volumes:
      - natsdata:/data
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8222/healthz']
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus

  loki:
    image: grafana/loki:3.2.0
    command: ['-config.file=/etc/loki/loki-config.yml']
    volumes:
      - ../loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki

  promtail:
    image: grafana/promtail:3.2.0
    command: ['-config.file=/etc/promtail/promtail-config.yml']
    volumes:
      - ../loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
  redisdata:
  natsdata:
  promdata:
  lokidata:
  grafanadata:
